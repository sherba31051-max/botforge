name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Build debug APK
        working-directory: android
        run: gradle :app:assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: botforge-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Publish APK release
        uses: ncipollo/release-action@v1
        with:
          tag: latest-debug
          name: BotForge debug APK
          body: |
            Автоматическая debug-сборка APK из main.

            APK открывает веб-приложение BotForge: https://botforge-poi31051.adaptive.ai
          artifacts: android/app/build/outputs/apk/debug/app-debug.apk
          allowUpdates: true
          replacesArtifacts: true
